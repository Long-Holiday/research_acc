<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta name="description" content="daily arxiv ai-enhanced statistics">
    <title>Statistics - Daily arXiv AI Enhanced</title>
    <link rel="icon" type="image/png" href="assets/logo2-removebg-preview.png">
    <link rel="shortcut icon" type="image/png" href="assets/logo2-removebg-preview.png">
    <link rel="stylesheet" href="css/styles.css">
    <link rel="stylesheet" href="css/statistic.css">
    <link rel="stylesheet" href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&display=swap">
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/flatpickr/dist/flatpickr.min.css">
    <script src="https://cdn.jsdelivr.net/npm/flatpickr"></script>
    <script src="https://cdn.jsdelivr.net/npm/d3@7/dist/d3.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/d3-cloud@1.2.7/build/d3.layout.cloud.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/compromise@14.14.4/builds/compromise.min.js"></script>

    <!-- Authentication Scripts -->
    <script src="js/auth.js"></script>
    <!-- Data Source Configuration -->
    <script src="js/data-config.js"></script>
    <script>
        // Check authentication on page load
        Auth.requireAuth();

        // Show logout button only if password protection is enabled
        document.addEventListener('DOMContentLoaded', function() {
            const logoutButton = document.getElementById('logoutButton');
            if (logoutButton && Auth.isPasswordEnabled()) {
                logoutButton.style.display = '';
            }
        });
    </script>
</head>
<body>
    <div class="app-container">
        <header>
            <div class="header-content">
                <div class="header-left">

                </div>
                
                <div class="header-center">
                    <a href="index.html" class="site-logo">
                        <img src="assets/logo2-removebg-preview.png" alt="Daily arXiv AI Enhanced Logo" class="logo-image">
                        <span class="site-title">Daily arXiv AI Enhanced</span>
                    </a>
                </div>
                
                <div class="header-controls">
                    <div class="date-selector">
                        <div class="date-display">
                            <span id="currentDate">Loading...</span>
                            <button id="calendarButton" class="icon-button">
                                <svg width="24" height="24" viewBox="0 0 24 24" fill="none" xmlns="http://www.w3.org/2000/svg">
                                    <path d="M19 4H18V2H16V4H8V2H6V4H5C3.89 4 3.01 4.9 3.01 6L3 20C3 21.1 3.89 22 5 22H19C20.1 22 21 21.1 21 20V6C21 4.9 20.1 4 19 4ZM19 20H5V9H19V20ZM7 11H12V16H7V11Z" fill="currentColor"/>
                                </svg>
                            </button>
                        </div>
                    </div>
                    <a href="index.html" class="back-button">
                        <svg width="24" height="24" viewBox="0 0 24 24" fill="none" xmlns="http://www.w3.org/2000/svg">
                            <path d="M20 11H7.83L13.42 5.41L12 4L4 12L12 20L13.41 18.59L7.83 13H20V11Z" fill="currentColor"/>
                        </svg>
                    </a>
                    <button id="logoutButton" onclick="Auth.logout()" class="icon-button" title="Logout" style="border: none; background: transparent; cursor: pointer; color: #e74c3c; display: none;">
                        <svg width="24" height="24" viewBox="0 0 24 24" fill="none" xmlns="http://www.w3.org/2000/svg">
                            <path d="M17 7L15.59 8.41L18.17 11H8V13H18.17L15.59 15.59L17 17L22 12L17 7ZM4 5H12V3H4C2.9 3 2 3.9 2 5V19C2 20.1 2.9 21 4 21H12V19H4V5Z" fill="currentColor"/>
                        </svg>
                    </button>
                </div>
            </div>
        </header>

        <main class="statistics-page">
            <div class="statistics-container">
                <div class="statistics-header">
                    <h1>Statistics</h1>
                    <p>Analyze paper trends and popular topics</p>
                </div>

                <div class="statistics-content">
                    <div class="date-picker-modal" id="datePickerModal">
                        <div class="date-picker-content">
                            <div class="date-picker-body">
                                <h3 class="date-picker-title">Select Date Range</h3>
                                <div class="date-picker-inputs" style="display: flex; flex-direction: column; gap: 12px; margin-bottom: 20px;">
                                    <div class="date-input-group">
                                        <label style="display: block; margin-bottom: 6px; font-weight: 500; font-size: 14px;">Start Date</label>
                                        <div class="flatpickr-container">
                                            <input type="text" id="startDatePicker" placeholder="Select Start Date" style="width: 100%; padding: 10px; border: 1px solid var(--border-color); border-radius: var(--radius-md); background: var(--bg-primary); color: var(--text-primary); font-family: inherit; font-size: 14px; box-sizing: border-box;">
                                        </div>
                                    </div>
                                    <div class="date-input-group">
                                        <label style="display: block; margin-bottom: 6px; font-weight: 500; font-size: 14px;">End Date</label>
                                        <div class="flatpickr-container">
                                            <input type="text" id="endDatePicker" placeholder="Select End Date" style="width: 100%; padding: 10px; border: 1px solid var(--border-color); border-radius: var(--radius-md); background: var(--bg-primary); color: var(--text-primary); font-family: inherit; font-size: 14px; box-sizing: border-box;">
                                        </div>
                                    </div>
                                </div>
                                <div class="date-actions" style="display: flex; justify-content: flex-end; gap: 10px;">
                                    <button onclick="toggleDatePicker()" class="cancel-button" style="padding: 8px 16px; border-radius: var(--radius-md); border: 1px solid var(--border-color); background: transparent; cursor: pointer; color: var(--text-primary);">Cancel</button>
                                    <button id="applyDateRange" class="action-button" style="padding: 8px 16px; border-radius: var(--radius-md); background: var(--primary-color); color: white; border: none; cursor: pointer; font-weight: 500;">Apply</button>
                                </div>
                            </div>
                        </div>
                    </div>

                    <div id="papersList">
                        <!-- Paper statistics will be dynamically inserted here -->
                    </div>

                    <div class="network-visualization">
                        <h3>Keyword Co-occurrence Network</h3>
                        <div id="networkContainer" style="width: 100%; height: 500px; background: var(--bg-secondary); border-radius: 8px; overflow: hidden; position: relative;"></div>
                    </div>
                </div>
            </div>
        </main>
        
        <footer>
            <div class="footer-content">
                <p>&copy; 2025 daily-arXiv-ai-enhanced</p>
            </div>
        </footer>
    </div>

    <div id="paperSidebar" class="paper-sidebar">
        <div class="sidebar-header">
            <div class="header-content">
                <h3 id="selectedKeyword"></h3>
            </div>
            <button class="close-sidebar">&times;</button>
        </div>
        <div class="sidebar-content">
            <div id="relatedPapers" class="related-papers">
                <!-- Papers will be dynamically inserted here -->
            </div>
        </div>
    </div>

    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
    <script src="js/statistic.js"></script>
</body>
</html>
